services:
  tracker:
    build: .
    container_name: streaming-tracker
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - OMDB_API_KEY=${OMDB_API_KEY}
      - WATCH_REGION=${WATCH_REGION:-US}
      - SYNC_ENABLED=${SYNC_ENABLED:-true}
      - SYNC_HOUR=${SYNC_HOUR:-6}
      - SYNC_MINUTE=${SYNC_MINUTE:-0}
      - SYNC_TIMEZONE=${SYNC_TIMEZONE:-Asia/Shanghai}
      - SYNC_DAYS_BACK=${SYNC_DAYS_BACK:-30}
      - SYNC_MAX_PAGES=${SYNC_MAX_PAGES:-5}
      - SYNC_WINDOW_DAYS=${SYNC_WINDOW_DAYS:-90}
      - SYNC_BOOTSTRAP_ON_EMPTY=${SYNC_BOOTSTRAP_ON_EMPTY:-true}
      - SYNC_BOOTSTRAP_DAYS_BACK=${SYNC_BOOTSTRAP_DAYS_BACK:-1825}
      - SYNC_BOOTSTRAP_MAX_PAGES=${SYNC_BOOTSTRAP_MAX_PAGES:-10}
      - SYNC_BOOTSTRAP_WINDOW_DAYS=${SYNC_BOOTSTRAP_WINDOW_DAYS:-365}
    restart: unless-stopped
