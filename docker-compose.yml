services:
  tracker:
    build: .
    container_name: streaming-tracker
    ports:
      - "8000:8000"
    volumes:
      - ${TRACKER_DATA_DIR:-./data}:/app/data
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - OMDB_API_KEY=${OMDB_API_KEY}
      - NETFLIX_WATCH_REGIONS=${NETFLIX_WATCH_REGIONS:-}
      - DISNEY_WATCH_REGIONS=${DISNEY_WATCH_REGIONS:-}
      - MAX_WATCH_REGIONS=${MAX_WATCH_REGIONS:-}
      - AMAZON_WATCH_REGIONS=${AMAZON_WATCH_REGIONS:-}
      - APPLE_WATCH_REGIONS=${APPLE_WATCH_REGIONS:-}
      - HULU_WATCH_REGIONS=${HULU_WATCH_REGIONS:-}
      - WATCH_MONETIZATION_TYPES=${WATCH_MONETIZATION_TYPES:-flatrate,ads,free,rent,buy}
      - HTTP_RETRIES=${HTTP_RETRIES:-3}
      - DETAIL_REFRESH_DAYS=${DETAIL_REFRESH_DAYS:-7}
      - PENDING_RETRY_DAYS=${PENDING_RETRY_DAYS:-1,3,7,14,30}
      - PROVIDER_STALE_DAYS=${PROVIDER_STALE_DAYS:-45}
      - ENRICH_BATCH_SIZE=${ENRICH_BATCH_SIZE:-200}
      - SYNC_ENABLED=${SYNC_ENABLED:-false}
      - SYNC_HOUR=${SYNC_HOUR:-6}
      - SYNC_MINUTE=${SYNC_MINUTE:-0}
      - SYNC_TIMEZONE=${SYNC_TIMEZONE:-Asia/Shanghai}
      - SYNC_DAYS_BACK=${SYNC_DAYS_BACK:-30}
      - SYNC_MAX_PAGES=${SYNC_MAX_PAGES:-5}
      - SYNC_WINDOW_DAYS=${SYNC_WINDOW_DAYS:-0}
      - SYNC_INCREMENTAL_OVERLAP_DAYS=${SYNC_INCREMENTAL_OVERLAP_DAYS:-3}
      - SYNC_CATALOG_SCAN_ENABLED=${SYNC_CATALOG_SCAN_ENABLED:-true}
      - SYNC_CATALOG_SCAN_DAYS_BACK=${SYNC_CATALOG_SCAN_DAYS_BACK:-3650}
      - SYNC_CATALOG_WINDOW_DAYS=${SYNC_CATALOG_WINDOW_DAYS:-365}
      - SYNC_BOOTSTRAP_ON_EMPTY=${SYNC_BOOTSTRAP_ON_EMPTY:-false}
      - SYNC_BOOTSTRAP_DAYS_BACK=${SYNC_BOOTSTRAP_DAYS_BACK:-1825}
      - SYNC_BOOTSTRAP_MAX_PAGES=${SYNC_BOOTSTRAP_MAX_PAGES:-29}
    restart: unless-stopped
    # 弱 ARM 软路由限额：防止异常分支抢光 2GB 内存（无 swap）
    mem_limit: 768m
    mem_reservation: 256m
    cpus: 2
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"
